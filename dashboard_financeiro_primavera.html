<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM GABRIEL — Financeiro Primavera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:          #0a0f1e;
    --bg2:         #111827;
    --bg3:         #1a2440;
    --border:      #1e3058;
    --blue:        #2563eb;
    --blue-light:  #3b82f6;
    --blue-glow:   #60a5fa;
    --cyan:        #06b6d4;
    --green:       #10b981;
    --red:         #ef4444;
    --amber:       #f59e0b;
    --text:        #f1f5f9;
    --text2:       #94a3b8;
    --text3:       #475569;
    --card-radius: 12px;
    --font:        'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #0d1b3e 0%, #1a2e5a 50%, #0d1b3e 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #fff;
    box-shadow: 0 0 20px rgba(37,99,235,0.4);
  }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .saldo-badge {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    text-align: right;
  }
  .saldo-badge .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .saldo-badge .valor { font-size: 20px; font-weight: 700; color: var(--cyan); font-variant-numeric: tabular-nums; }
  .sync-btn {
    background: var(--blue);
    border: none; border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 600;
    padding: 9px 18px; cursor: pointer;
    transition: background .2s;
  }
  .sync-btn:hover { background: var(--blue-light); }
  .sync-status { font-size: 11px; color: var(--text3); }

  /* ── TABS ────────────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 20px;
    border-radius: 8px 8px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: var(--text2);
    background: transparent;
    white-space: nowrap;
    transition: all .2s;
  }
  .tab:hover { color: var(--text); background: var(--bg3); }
  .tab.active {
    color: var(--blue-glow);
    background: var(--bg);
    border-color: var(--border);
    border-bottom-color: var(--bg);
  }

  /* ── CONTENT ─────────────────────────────────────────────── */
  .content { padding: 28px 32px; display: none; }
  .content.active { display: block; }

  /* ── GRID KPI ────────────────────────────────────────────── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    position: relative; overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent, var(--blue));
  }
  .kpi .kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .kpi .kpi-value { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .kpi .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .kpi.green { --accent: var(--green); }
  .kpi.red   { --accent: var(--red); }
  .kpi.amber { --accent: var(--amber); }
  .kpi.cyan  { --accent: var(--cyan); }

  /* ── CARD ────────────────────────────────────────────────── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text2); text-transform: uppercase; letter-spacing: .6px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── GRID 2 COLS ─────────────────────────────────────────── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

  /* ── DRE TABLE ───────────────────────────────────────────── */
  .dre-table { width: 100%; border-collapse: collapse; }
  .dre-table tr { border-bottom: 1px solid var(--border); }
  .dre-table tr:last-child { border-bottom: none; }
  .dre-table td { padding: 10px 8px; font-size: 13px; }
  .dre-table .group-header td {
    background: var(--bg3); font-weight: 700;
    font-size: 12px; text-transform: uppercase;
    letter-spacing: .5px; color: var(--blue-glow);
    padding: 8px;
  }
  .dre-table .sub-row td:first-child { padding-left: 24px; color: var(--text2); }
  .dre-table .total-row td {
    font-weight: 700; font-size: 14px;
    border-top: 2px solid var(--border);
    padding-top: 14px;
  }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* ── BARRA HORIZONTAL ────────────────────────────────────── */
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { width: 200px; font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--blue-light); transition: width .6s ease; }
  .bar-fill.red { background: var(--red); }
  .bar-fill.green { background: var(--green); }
  .bar-fill.amber { background: var(--amber); }
  .bar-val { width: 110px; text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; flex-shrink: 0; }

  /* ── CONTAS A PAGAR TABLE ────────────────────────────────── */
  .cp-table { width: 100%; border-collapse: collapse; }
  .cp-table th {
    text-align: left; font-size: 11px;
    color: var(--text3); text-transform: uppercase; letter-spacing: .5px;
    padding: 8px; border-bottom: 1px solid var(--border);
  }
  .cp-table td { padding: 10px 8px; font-size: 13px; border-bottom: 1px solid rgba(30,48,88,.5); }
  .cp-table tr:hover td { background: rgba(37,99,235,.05); }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .badge.vencido  { background: rgba(239,68,68,.15); color: #fca5a5; }
  .badge.previsao { background: rgba(245,158,11,.15); color: #fcd34d; }
  .badge.p1 { background: rgba(239,68,68,.2); color: #fca5a5; }
  .badge.p2 { background: rgba(245,158,11,.2); color: #fcd34d; }
  .badge.p3 { background: rgba(99,102,241,.2); color: #a5b4fc; }
  .badge.p4 { background: rgba(148,163,184,.1); color: var(--text2); }
  .badge.p5 { background: rgba(148,163,184,.1); color: var(--text3); }

  /* ── EMPRÉSTIMOS ─────────────────────────────────────────── */
  .emp-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .emp-nome { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
  .emp-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .emp-row span:last-child { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text); }

  /* ── CHART WRAPPER ───────────────────────────────────────── */
  .chart-wrap { position: relative; height: 300px; }
  .chart-wrap-tall { position: relative; height: 380px; }

  /* ── LOADING / ERROR ─────────────────────────────────────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: var(--text2); gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--blue-light);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); text-align: center; padding: 20px; }

  /* ── FILTRO MÊS ──────────────────────────────────────────── */
  .filter-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-bar label { font-size: 12px; color: var(--text2); }
  .filter-bar select, .filter-bar input {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px;
    padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  .filter-btn {
    background: var(--blue); border: none; border-radius: 6px;
    color: #fff; font-size: 12px; font-weight: 600;
    padding: 7px 16px; cursor: pointer;
  }
  .filter-btn:hover { background: var(--blue-light); }

  /* ── EVOLUÇÃO SALDO ──────────────────────────────────────── */
  .evolucao-info { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .evolucao-item { font-size: 12px; color: var(--text2); }
  .evolucao-item span { font-weight: 700; font-variant-numeric: tabular-nums; }
  .evolucao-item .v-green { color: var(--green); }
  .evolucao-item .v-red   { color: var(--red); }
  .evolucao-item .v-blue  { color: var(--cyan); }

  /* ── SCROLLABLE TABLE ────────────────────────────────────── */
  .table-scroll { overflow-x: auto; overflow-y: auto; max-height: 420px; }
  .table-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
  .table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .header { padding: 14px 16px; flex-wrap: wrap; gap: 12px; }
    .tabs { padding: 12px 16px 0; }
    .content { padding: 20px 16px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .bar-label { width: 120px; }
  }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <div class="logo-mark">DG</div>
    <div>
      <div class="header-title">Dom Gabriel — Financeiro</div>
      <div class="header-sub">Primavera do Leste • MT</div>

  <div class="header-right">

<!-- ── TABS ───────────────────────────────────────────────── -->
<div class="tabs">

  <button class="tab" onclick="setTab('dre')">📊 DRE de Caixa</button>
  <button class="tab" onclick="setTab('evolucao')">📈 Evolução Mensal</button>

  <button class="tab" onclick="setTab('emprestimos')">🏦 Empréstimos</button>

</div>

<!-- ══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ -->
<div id="tab-posicao" class="content active">
  <div id="posicao-content">

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════

<div id="tab-dre" class="content">
  <div class="filter-bar">
    <label>Período:</label>
    <select id="dre-ano">
      <option value="">Todos os anos</option>

    </select>
    <button class="filter-btn" onclick="renderDRE()">Filtrar</button>

<!-- ══════════════════════════════════════════════════════════

<div id="tab-evolucao" class="content">
  <div class="filter-bar">
    <label>Ano:</label>
    <select id="evol-ano">
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
      <option value="">Todos</option>
    </select>
    <button class="filter-btn" onclick="renderEvolucao()">Filtrar</button>
  </div>
  <div id="evolucao-content">
    <div class="loading"><div class="spinner"></div> Carregando...</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ -->
<div id="tab-radar" class="content">
  <div class="filter-bar">
    <label>Período:</label>
    <select id="radar-ano">
      <option value="">Todos os anos</option>
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
    </select>
    <select id="radar-mes">
      <option value="">Todos os meses</option>
      <option value="1">Janeiro</option><option value="2">Fevereiro</option>
      <option value="3">Março</option><option value="4">Abril</option>
      <option value="5">Maio</option><option value="6">Junho</option>

      <option value="11">Novembro</option><option value="12">Dezembro</option>
    </select>
    <button class="filter-btn" onclick="renderRadar()">Filtrar</button>
  </div>
  <div id="radar-content">
    <div class="loading"><div class="spinner"></div> Carregando...</div>

</div>

<!-- ══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ -->
<div id="tab-emprestimos" class="content">
  <div id="emprestimos-content">
    <div class="loading"><div class="spinner"></div> Carregando...</div>

</div>

<!-- ══════════════════════════════════════════════════════════
     ABA 6 — CONTAS A PAGAR
═══════════════════════════════════════════════════════════ -->
<div id="tab-contas" class="content">
  <div class="filter-bar">
    <label>Status:</label>
    <select id="cp-status">
      <option value="">Todos</option>
      <option value="VENCIDO">Vencido</option>
      <option value="PREVISÃO">Previsão</option>
    </select>
    <label>Prioridade:</label>
    <select id="cp-prio">
      <option value="">Todas</option>

      <option value="P3">P3</option>
      <option value="P4">P4</option>
      <option value="P5">P5</option>
    </select>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://ksniedeilzwngtsjnvev.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GdQoxmwNgw54ctCXwP4Ikg_Z1puV2Xy';
const TABELA      = 'fluxo_primavera';
const SALDO_ATUAL = 174818.84; // atualizar manualmente ou via Supabase

let DADOS = []; // cache global
let charts = {}; // cache de charts

/* ══════════════════════════════════════════════════════════
   UTILITÁRIOS
══════════════════════════════════════════════════════════ */
const R$ = v => v == null ? '—' :
  new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' }).format(v);

const mesNome = m => ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][m] || m;

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

/* ══════════════════════════════════════════════════════════
   SUPABASE FETCH
══════════════════════════════════════════════════════════ */
async function fetchSupabase(params = '') {
  const url = `${SUPABASE_URL}/rest/v1/${TABELA}?select=*${params}&limit=10000`;
  const r = await fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  if (!r.ok) throw new Error(`Supabase: ${r.status}`);
  return r.json();
}

/* ══════════════════════════════════════════════════════════
   CARGA PRINCIPAL
══════════════════════════════════════════════════════════ */
async function carregarTudo() {
  document.getElementById('sync-status').textContent = 'Carregando...';
  try {
    DADOS = await fetchSupabase();
    const agora = new Date().toLocaleString('pt-BR');
    document.getElementById('sync-status').textContent = `Atualizado ${agora}`;

    // Saldo no header
    document.getElementById('saldo-header').textContent = R$(SALDO_ATUAL);

    renderPosicao();
    renderDRE();
    renderEvolucao();
    renderRadar();
    renderEmprestimos();
    renderContas();
  } catch(e) {
    document.getElementById('sync-status').textContent = 'Erro ao carregar';
    console.error(e);
  }
}

/* ══════════════════════════════════════════════════════════
   ABA 1 — POSIÇÃO ATUAL
══════════════════════════════════════════════════════════ */
function renderPosicao() {
  const hoje = new Date();
  const em30 = new Date(); em30.setDate(em30.getDate() + 30);
  const em30str = em30.toISOString().slice(0,10);
  const hojestr = hoje.toISOString().slice(0,10);

  // Vencidos não conciliados
  const vencidos = DADOS.filter(d =>
    d.pg_ab === 'VENCIDO' && d.es === 'Saída' && d.status !== 'Conciliado'
  );
  const totalVencido = vencidos.reduce((s,d) => s + Math.abs(d.valor_rs||0), 0);

  // Previsão 30 dias
  const prev30 = DADOS.filter(d =>
    d.pg_ab === 'PREVISÃO' && d.es === 'Saída' &&
    d.data && d.data <= em30str
  );
  const totalPrev30 = prev30.reduce((s,d) => s + Math.abs(d.valor_rs||0), 0);

  // Entradas previstas 30 dias
  const entPrev30 = DADOS.filter(d =>
    d.pg_ab === 'PREVISÃO' && d.es === 'Entrada' &&
    d.data && d.data <= em30str
  );
  const totalEntPrev30 = entPrev30.reduce((s,d) => s + Math.abs(d.valor_rs||0), 0);

  // Total entradas e saídas conciliadas (mês atual)
  const mesAtual = hoje.getMonth() + 1;
  const anoAtual = hoje.getFullYear();
  const mesD = DADOS.filter(d => d.mes == mesAtual && d.ano == anoAtual && d.status === 'Conciliado');
  const entMes = mesD.filter(d => d.es === 'Entrada').reduce((s,d) => s + Math.abs(d.valor_rs||0), 0);
  const saiMes = mesD.filter(d => d.es === 'Saída').reduce((s,d) => s + Math.abs(d.valor_rs||0), 0);
  const saldoMes = entMes - saiMes;

  // Caixa projetado
  const caixaProj = SALDO_ATUAL - totalPrev30;

  const el = document.getElementById('posicao-content');
  el.innerHTML = `
  <div class="kpi-grid">
    <div class="kpi cyan">
      <div class="kpi-label">Saldo Bancário Atual</div>
      <div class="kpi-value" style="color:var(--cyan)">${R$(SALDO_ATUAL)}</div>
      <div class="kpi-sub">Atualizado manualmente na planilha</div>
    </div>

function renderVencidosPorPrio(vencidos) {
  const grupos = {};
  vencidos.forEach(d => {
    const p = d.prioridades || 'S/P';
    if (!grupos[p]) grupos[p] = { count:0, total:0 };
    grupos[p].count++;
    grupos[p].total += Math.abs(d.valor_rs||0);
  });
  const prios = Object.keys(grupos).sort();
  if (!prios.length) return '<div style="color:var(--green);padding:20px">✓ Nenhum vencido em aberto</div>';
  const max = Math.max(...prios.map(p => grupos[p].total));
  return prios.map(p => {
    const g = grupos[p];
    const pct = max > 0 ? (g.total/max*100).toFixed(0) : 0;
    const cor = p==='P1'?'red':p==='P2'?'amber':'';
    return `<div class="bar-row">
      <div class="bar-label"><span class="badge ${p.toLowerCase()}">${p}</span></div>
      <div class="bar-track"><div class="bar-fill ${cor}" style="width:${pct}%"></div></div>
      <div class="bar-val neg">${R$(g.total)}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════════
   ABA 2 — DRE DE CAIXA
══════════════════════════════════════════════════════════ */
function renderDRE() {
  const ano = document.getElementById('dre-ano').value;
  const mes = document.getElementById('dre-mes').value;

  let dados = DADOS.filter(d => d.status === 'Conciliado' || d.pg_ab === 'VENCIDO');
  if (ano) dados = dados.filter(d => String(d.ano) === ano);
  if (mes) dados = dados.filter(d => String(d.mes) === mes);

  // Agrupa por plano financeiro
  const grupos = {};
  dados.forEach(d => {
    const plano = d.plano_financeiro || 'Sem classificação';
    if (!grupos[plano]) grupos[plano] = 0;
    grupos[plano] += (d.valor_rs || 0);
  });

  // Estrutura hierárquica
  const hierarquia = [
    { id:'1)', label:'1) Entradas', cor:'pos' },
    { id:'2)', label:'2) Custos/Despesas Variáveis', cor:'neg' },
    { id:'3)', label:'3) Despesas Fixas', cor:'neg' },
    { id:'4)', label:'4) Tributos', cor:'neg' },
    { id:'5)', label:'5) Financeiras', cor:'neg' },
    { id:'6)', label:'6) Empréstimos', cor:'neg' },
    { id:'7)', label:'7) Investimentos', cor:'neg' },
    { id:'8)', label:'8) Movimentação de Sócios', cor:'neg' },
  ];

  let totalEntradas = 0, totalSaidas = 0;
  let rows = '';

  hierarquia.forEach(h => {
    const sub = Object.entries(grupos)
      .filter(([k]) => k.startsWith(h.id))
      .sort((a,b) => a[0].localeCompare(b[0]));

    if (!sub.length) return;

    const totalGrupo = sub.reduce((s,[,v]) => s+v, 0);
    if (h.id === '1)') totalEntradas += totalGrupo;
    else totalSaidas += totalGrupo;

    rows += `<tr class="group-header"><td colspan="2">${h.label}</td><td class="num ${totalGrupo>=0?'pos':'neg'}">${R$(totalGrupo)}</td></tr>`;
    sub.forEach(([k,v]) => {
      const label = k.replace(/^\d+\) [^-]+ - /, '');
      rows += `<tr class="sub-row"><td>${label}</td><td></td><td class="num ${v>=0?'pos':'neg'}">${R$(v)}</td></tr>`;
    });
  });

  // Outros
  const outros = Object.entries(grupos).filter(([k]) => !hierarquia.some(h => k.startsWith(h.id)));
  if (outros.length) {
    const tot = outros.reduce((s,[,v])=>s+v,0);
    rows += `<tr class="group-header"><td colspan="2">Outros</td><td class="num">${R$(tot)}</td></tr>`;
    outros.forEach(([k,v]) => {
      rows += `<tr class="sub-row"><td>${k}</td><td></td><td class="num ${v>=0?'pos':'neg'}">${R$(v)}</td></tr>`;
    });
  }

  const resultado = totalEntradas + totalSaidas;

  const el = document.getElementById('dre-content');
  el.innerHTML = `
  <div class="grid-2" style="margin-bottom:20px">
    <div class="kpi green">
      <div class="kpi-label">Total Entradas</div>
      <div class="kpi-value" style="color:var(--green)">${R$(totalEntradas)}</div>
    </div>
    <div class="kpi red">
      <div class="kpi-label">Total Saídas</div>
      <div class="kpi-value" style="color:var(--red)">${R$(Math.abs(totalSaidas))}</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Demonstrativo por Plano Financeiro</div>
    <table class="dre-table">
      <thead><tr>
        <th style="text-align:left;padding:8px;font-size:11px;color:var(--text3)">CATEGORIA</th>
        <th></th>
        <th class="num" style="padding:8px;font-size:11px;color:var(--text3)">VALOR R$</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="2"><strong>RESULTADO DO PERÍODO</strong></td>
          <td class="num ${resultado>=0?'pos':'neg'}"><strong>${R$(resultado)}</strong></td>
        </tr>
      </tfoot>
    </table>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   ABA 3 — EVOLUÇÃO MENSAL
══════════════════════════════════════════════════════════ */
function renderEvolucao() {
  const ano = document.getElementById('evol-ano').value;
  let dados = DADOS.filter(d => d.status === 'Conciliado' || d.pg_ab === 'VENCIDO');
  if (ano) dados = dados.filter(d => String(d.ano) === ano);

  // Agrupa por ano-mes
  const porMes = {};
  dados.forEach(d => {
    if (!d.ano || !d.mes) return;
    const k = `${d.ano}-${String(d.mes).padStart(2,'0')}`;
    if (!porMes[k]) porMes[k] = { ent:0, sai:0, label:`${mesNome(d.mes)}/${d.ano}` };
    const v = d.valor_rs || 0;
    if (v > 0) porMes[k].ent += v;
    else porMes[k].sai += Math.abs(v);
  });

  // Filtra meses futuros (ano > 2026 ou fora do range razoável)
  const hoje = new Date();
  const chaves = Object.keys(porMes)
    .filter(k => {
      const [a, m] = k.split('-').map(Number);
      return a <= hoje.getFullYear() + 1 && a >= 2024;
    })
    .sort();

  const labels = chaves.map(k => porMes[k].label);
  const entradas = chaves.map(k => porMes[k].ent);
  const saidas   = chaves.map(k => porMes[k].sai);

  // Saldo acumulado
  let acum = 0;
  const saldoAcum = chaves.map(k => {
    acum += porMes[k].ent - porMes[k].sai;
    return acum;
  });

  const totalEnt = entradas.reduce((s,v)=>s+v,0);
  const totalSai = saidas.reduce((s,v)=>s+v,0);
  const resultado = totalEnt - totalSai;

  const el = document.getElementById('evolucao-content');
  el.innerHTML = `
  <div class="evolucao-info">
    <div class="evolucao-item">Entradas: <span class="v-green">${R$(totalEnt)}</span></div>
    <div class="evolucao-item">Saídas: <span class="v-red">${R$(totalSai)}</span></div>
    <div class="evolucao-item">Resultado: <span class="${resultado>=0?'v-green':'v-red'}">${R$(resultado)}</span></div>
  </div>
  <div class="card">
    <div class="card-title">Entradas × Saídas por Mês</div>
    <div class="chart-wrap-tall"><canvas id="chart-evolucao-bar"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">Saldo Acumulado</div>
    <div class="chart-wrap"><canvas id="chart-evolucao-line"></canvas></div>
  </div>`;

  destroyChart('evolucao-bar');
  const ctx1 = document.getElementById('chart-evolucao-bar').getContext('2d');
  charts['evolucao-bar'] = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Entradas', data: entradas, backgroundColor:'rgba(16,185,129,.7)', borderRadius: 4 },
        { label:'Saídas',   data: saidas,   backgroundColor:'rgba(239,68,68,.7)',  borderRadius: 4 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { labels:{ color:'#94a3b8' } },
        tooltip: { callbacks:{ label: c=>`${c.dataset.label}: ${R$(c.raw)}` } }
      },
      scales: {
        x: { ticks:{ color:'#475569' }, grid:{ color:'#1e3058' } },
        y: { ticks:{ color:'#475569', callback: v=>R$(v) }, grid:{ color:'#1e3058' } }
      }
    }
  });

  destroyChart('evolucao-line');
  const ctx2 = document.getElementById('chart-evolucao-line').getContext('2d');
  charts['evolucao-line'] = new Chart(ctx2, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label:'Saldo Acumulado',
        data: saldoAcum,
        borderColor:'#06b6d4',
        backgroundColor:'rgba(6,182,212,.08)',
        fill: true, tension:.3, pointRadius:4,
        pointBackgroundColor:'#06b6d4'
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { labels:{ color:'#94a3b8' } },
        tooltip: { callbacks:{ label: c=>`Saldo: ${R$(c.raw)}` } }
      },
      scales: {
        x: { ticks:{ color:'#475569' }, grid:{ color:'#1e3058' } },
        y: { ticks:{ color:'#475569', callback: v=>R$(v) }, grid:{ color:'#1e3058' } }
      }
    }
  });
}

/* ══════════════════════════════════════════════════════════
   ABA 6 — CONTAS A PAGAR
══════════════════════════════════════════════════════════ */
function renderContas() {
  const status = document.getElementById('cp-status').value;
  const prio   = document.getElementById('cp-prio').value;

  const hoje = new Date();
  const em30 = new Date(); em30.setDate(em30.getDate() + 30);
  const em30str = em30.toISOString().slice(0,10);

  let dados = DADOS.filter(d => {
    if (d.es !== 'Saída') return false;
    // Vencidos não conciliados
    if (d.pg_ab === 'VENCIDO' && d.status !== 'Conciliado') return true;
    // Previsão próximos 30 dias
    if (d.pg_ab === 'PREVISÃO' && d.data && d.data <= em30str) return true;
    return false;
  });

  if (status) dados = dados.filter(d => d.pg_ab === status);
  if (prio)   dados = dados.filter(d => d.prioridades === prio);

  // Ordena: P1 primeiro, depois por valor
  const priOrd = {'P1':1,'P2':2,'P3':3,'P4':4,'P5':5};
  dados.sort((a,b) => {
    const pa = priOrd[a.prioridades]||9, pb = priOrd[b.prioridades]||9;
    if (pa !== pb) return pa - pb;
    return Math.abs(b.valor_rs||0) - Math.abs(a.valor_rs||0);
  });

  const totalCP = dados.reduce((s,d) => s + Math.abs(d.valor_rs||0), 0);

  const el = document.getElementById('contas-content');

  if (!dados.length) {
    el.innerHTML = `<div style="color:var(--green);text-align:center;padding:40px;font-size:16px">✓ Nenhuma conta a pagar no filtro selecionado</div>`;
    return;
  }

  el.innerHTML = `
  <div class="kpi-grid" style="margin-bottom:20px">
    <div class="kpi red">
      <div class="kpi-label">Total a Pagar</div>
      <div class="kpi-value" style="color:var(--red)">${R$(totalCP)}</div>
      <div class="kpi-sub">${dados.length} lançamentos</div>
    </div>
    <div class="kpi red">
      <div class="kpi-label">Somente Vencidos</div>
      <div class="kpi-value" style="color:var(--red)">${R$(dados.filter(d=>d.pg_ab==='VENCIDO').reduce((s,d)=>s+Math.abs(d.valor_rs||0),0))}</div>
      <div class="kpi-sub">${dados.filter(d=>d.pg_ab==='VENCIDO').length} em atraso</div>
    </div>
    <div class="kpi amber">
      <div class="kpi-label">Previsão 30 dias</div>
      <div class="kpi-value" style="color:var(--amber)">${R$(dados.filter(d=>d.pg_ab==='PREVISÃO').reduce((s,d)=>s+Math.abs(d.valor_rs||0),0))}</div>
      <div class="kpi-sub">${dados.filter(d=>d.pg_ab==='PREVISÃO').length} agendados</div>
    </div>
    <div class="kpi cyan">
      <div class="kpi-label">P1 + P2 (Urgentes)</div>
      <div class="kpi-value" style="color:var(--cyan)">${R$(dados.filter(d=>['P1','P2'].includes(d.prioridades)).reduce((s,d)=>s+Math.abs(d.valor_rs||0),0))}</div>
      <div class="kpi-sub">${dados.filter(d=>['P1','P2'].includes(d.prioridades)).length} lançamentos urgentes</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Lançamentos Pendentes</div>
    <div class="table-scroll">
      <table class="cp-table">
        <thead>
          <tr>
            <th>Data</th>
            <th>Fornecedor</th>
            <th>Categoria</th>
            <th>Status</th>
            <th>Prio</th>
            <th class="num">Valor</th>
          </tr>
        </thead>
        <tbody>
          ${dados.map(d => {
            const data = d.data ? d.data.slice(0,10).split('-').reverse().join('/') : '—';
            const forn = (d.fornecedor||'—').slice(0,35);
            const cat  = (d.plano_financeiro||'—').replace(/^\d+\) /,'').slice(0,30);
            const st   = d.pg_ab === 'VENCIDO' ? '<span class="badge vencido">VENCIDO</span>' : '<span class="badge previsao">PREVISÃO</span>';
            const pr   = d.prioridades ? `<span class="badge ${(d.prioridades||'').toLowerCase()}">${d.prioridades}</span>` : '—';
            return `<tr>
              <td style="white-space:nowrap">${data}</td>
              <td title="${d.fornecedor||''}">${forn}</td>
              <td style="color:var(--text2);font-size:12px">${cat}</td>
              <td>${st}</td>
              <td>${pr}</td>
              <td class="num neg">${R$(Math.abs(d.valor_rs||0))}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   NAVEGAÇÃO DE ABAS
══════════════════════════════════════════════════════════ */
function setTab(nome) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelector(`#tab-${nome}`).classList.add('active');
  event.currentTarget.classList.add('active');
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
carregarTudo();
</script>
</body>
</html>
